<body class="flex">
    <!-- container -->
    <div class="container flex">
        <h1>To-Do List</h1>
        <!-- form -->
        <form action="#" class="form flex">
            <input type="text" name="" id="" placeholder="Enter Your Task..." class="input-text">
            <button id="" class="add-btn">add task</button>
        </form>
        <!-- dashboard -->
         <div class="dashboard flex">
            <div class="flex all-tasks">
                <h3>All Tasks</h3>
                <p id="all-tasks-p">0</p>
            </div>
            <div class="flex completed-tasks">
                <h3>Completed Tasks</h3>
                <p id="completed-tasks-p">0</p>
            </div>
            <div class="date flex">
                <h3><i class="fa-solid fa-calendar-days"></i> Date</h3>
                <p class="date-display">0</p>
            </div>
        </div>
        <!-- task-list -->
        <ul class="task-list flex">
        </ul>
    </div>
